services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agraharam-backend
    environment:
      TZ: ${TZ}
      # These override application.properties at runtime:
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      FILE_UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
    expose:
      - "8080"
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: agraharam-web
    environment:
      TZ: ${TZ}
      SITE_HOST: ${SITE_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
